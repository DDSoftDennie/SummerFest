<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Tickets – SummerFest 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <div class="nav-container">
      <a href="index.html" class="nav-logo">🔥 SummerFest</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="lineup.html">Lineup</a></li>
        <li><a href="booking.html">Buy Tickets</a></li>
      </ul>
    </div>
  </nav>

  <main class="section">
    <h1 class="section-title">Book Your Tickets</h1>
    <p class="section-subtitle">SummerFest 2026 &mdash; 2 May 2026 &mdash; Flying Space, Ostend</p>

    <div class="booking-wrapper">

      <form class="form-card" id="bookingForm" novalidate>

        <!-- Personal Info -->
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Jane" required />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+32 470 00 00 00" />
        </div>

        <!-- Ticket Quantity -->
        <div class="form-group">
          <label for="qty">Number of Tickets (max 10)</label>
          <select id="qty" name="qty">
            <option value="1">1 ticket</option>
            <option value="2">2 tickets</option>
            <option value="3">3 tickets</option>
            <option value="4">4 tickets</option>
            <option value="5">5 tickets</option>
            <option value="6">6 tickets</option>
            <option value="7">7 tickets</option>
            <option value="8">8 tickets</option>
            <option value="9">9 tickets</option>
            <option value="10">10 tickets</option>
          </select>
        </div>

        <!-- Price Summary -->
        <div class="price-summary">
          <div class="price-row">
            <span class="label-text">Ticket price</span>
            <span id="pricePerUnit">€99</span>
          </div>
          <div class="price-row">
            <span class="label-text">Quantity</span>
            <span id="totalTickets">1</span>
          </div>
          <div class="price-row total">
            <span>Total</span>
            <span id="totalPrice">€99</span>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-book">Go to payment</button>
      </form>

      <!-- Confirmation -->
      <div id="successMessage">
        <h3>🎉 Booking Confirmed!</h3>
        <p>
          Thank you, <strong id="confirmName"></strong>!<br />
          You will be directed to the payment gateway.
        </p>
      </div>

    </div>
  </main>

  <footer>
    <p>&copy; 2026 <strong>SummerFest</strong> &mdash; Flying Space, Ostend &mdash; 2 May 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
